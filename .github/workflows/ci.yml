---
name: CI/CD Pipeline

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean install

      - name: Run Algorithm Tests
        run: mvn -B test -pl algorithm

      - name: Run Backend Integration Tests (with Testcontainers)
        run: mvn -B test -pl backend-interview

      - name: Code Quality Check (SpotBugs & PMD)
        run: mvn -B spotbugs:check pmd:check || true  # Placeholder for now

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build and Deploy Docs
        run: |
          # Placeholder for GitBook/MkDocs/AsciiDoc build commands
          echo "Building and deploying documentation to GitHub Pages..."
